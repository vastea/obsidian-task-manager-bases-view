name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Build plugin
        run: |
          npm ci
          npm run build

      # Keep one subject per attestation. Some downstream verifiers validate
      # release assets independently and cannot consume a multi-subject bundle.
      - name: Attest main.js
        uses: actions/attest@v4
        with:
          subject-path: main.js

      - name: Attest manifest.json
        uses: actions/attest@v4
        with:
          subject-path: manifest.json

      - name: Attest styles.css
        uses: actions/attest@v4
        with:
          subject-path: styles.css

      - name: Verify artifact attestations
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify main.js --repo "$GITHUB_REPOSITORY"
          gh attestation verify manifest.json --repo "$GITHUB_REPOSITORY"
          gh attestation verify styles.css --repo "$GITHUB_REPOSITORY"

      - name: Create release with artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            --generate-notes \
            main.js manifest.json styles.css
